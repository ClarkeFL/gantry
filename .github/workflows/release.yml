name: release
on:
  push:
    tags: ["v*"]
permissions:
  contents: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with: { node-version: 24 }
      - uses: actions/setup-go@v7
        with: { go-version: "1.26" }
      - run: cd web && npm ci && npm run build
      - run: |
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -ldflags "-s -w -X main.version=${GITHUB_REF_NAME}" -o gantry-linux-amd64 .
          CGO_ENABLED=0 GOOS=linux GOARCH=arm64 go build -ldflags "-s -w -X main.version=${GITHUB_REF_NAME}" -o gantry-linux-arm64 .
      - uses: softprops/action-gh-release@v3
        with:
          files: |
            gantry-linux-amd64
            gantry-linux-arm64
